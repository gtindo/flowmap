<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Flowmap</title>
  <script>
    (() => {
      const key = "flowmap-theme:v1";
      const allowed = new Set(["system", "light", "dark"]);
      let preference = "system";
      try {
        const stored = localStorage.getItem(key);
        if (allowed.has(stored)) preference = stored;
      } catch (_) {}
      const resolved = preference === "system"
        ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : preference;
      document.documentElement.dataset.theme = resolved;
      document.documentElement.dataset.themePreference = preference;
      document.documentElement.style.colorScheme = resolved;
    })();
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand" aria-label="Flowmap">
      <span class="brand-mark" aria-hidden="true">F</span>
      <strong>Flowmap</strong>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21"/></svg>
      <input id="search" autocomplete="off" placeholder="Search functions by package, receiver, or name…" aria-label="Search functions">
      <kbd class="search-hint">Esc</kbd>
      <div id="results" class="results hidden"></div>
    </div>

    <div class="controls" aria-label="Workbench controls">
      <div class="control-group" aria-label="Navigation">
        <button id="history-back" class="icon-button" title="Back to previous function" aria-label="Back to previous function" disabled>←</button>
        <button id="history-forward" class="icon-button" title="Forward to next function" aria-label="Forward to next function" disabled>→</button>
      </div>

      <div class="control-group graph-options" aria-label="Graph options">
        <label class="select-control"><span class="control-label">View</span><select id="view" aria-label="View mode"><option value="extended">Extended</option><option value="simple">Simplified</option></select></label>
        <label class="select-control"><span class="control-label">Flow</span><select id="direction" aria-label="Graph direction"><option value="downstream">Downstream</option><option value="upstream">Upstream</option><option value="both">Both directions</option></select></label>
        <label class="toggle-control"><input id="tests" type="checkbox"><span>Tests</span></label>
      </div>

      <div class="control-group" aria-label="Canvas tools">
        <button id="zoom-out" class="icon-button" title="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21M7.5 10.5h6"/></svg></button>
        <button id="zoom-in" class="icon-button" title="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21M10.5 7.5v6M7.5 10.5h6"/></svg></button>
        <button id="fit-graph" class="icon-button" title="Fit graph" aria-label="Fit graph"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5"/></svg></button>
        <button id="hand-tool" class="icon-button" title="Pan tool" aria-label="Pan tool" aria-pressed="false"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7.5 11V6.5a1.5 1.5 0 0 1 3 0V10m0-4.5a1.5 1.5 0 0 1 3 0V10m0-3.5a1.5 1.5 0 0 1 3 0V10m0-2.5a1.5 1.5 0 0 1 3 0v5.8c0 4.2-2.8 6.7-6.7 6.7h-.9c-2.2 0-3.8-.8-5.2-2.5l-3-3.7a1.5 1.5 0 0 1 2.2-2l1.6 1.2V11Z"/></svg></button>
        <button id="reset-layout" class="icon-button hidden" title="Reset layout" aria-label="Reset layout"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4v6h6M5.5 15a7 7 0 1 0 .5-7.5L4 10"/></svg></button>
      </div>

      <div class="control-group utilities" aria-label="Utilities">
        <div id="git-review" class="git-review hidden">
          <span id="git-branch" class="branch-chip" title="Branch captured by the current scan"></span>
          <button id="changes-button" class="text-button" aria-haspopup="true" aria-expanded="false">Changes 0</button>
          <div id="changes-menu" class="changes-menu hidden" role="menu" aria-label="Changed functions"></div>
        </div>
        <button id="rescan" class="text-button" title="Rebuild the codebase scan">Rescan codebase</button>
        <label class="theme-control"><span class="sr-only">Theme</span><select id="theme" title="Color theme" aria-label="Color theme"><option value="system">System</option><option value="light">Light</option><option value="dark">Dark</option></select></label>
      </div>
    </div>
  </header>

  <main>
    <section id="empty">
      <div class="empty-icon" aria-hidden="true">⌘</div>
      <h1>Begin with a function.</h1>
      <p>Search by package, receiver, or name. Flowmap reveals a focused typed neighborhood—not the whole-repository hairball.</p>
    </section>
    <section id="workspace" class="hidden">
      <div id="legend"><span class="legend-title">Classification</span><span><i class="dot pure"></i>pure</span><span><i class="dot edge"></i>edge</span><span><i class="dot unknown"></i>unknown</span><span><i class="dash"></i>dynamic candidate</span></div>
      <div id="canvas-wrap"><svg id="canvas"><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4 0 8z"></path></marker></defs><g id="edges"></g><g id="nodes"></g></svg></div>
    </section>
    <aside id="detail" class="hidden">
      <div id="detail-resize" role="separator" aria-label="Resize detail panel" aria-orientation="vertical"></div>
      <button id="close" class="icon-button" aria-label="Close details">×</button>
      <div id="detail-content"></div>
    </aside>
  </main>
  <script src="/app.js"></script>
</body>
</html>
