<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flowmap</title><link rel="stylesheet" href="/style.css"><style>.controls button{padding:7px 9px;border:1px solid #71847a;border-radius:6px;background:#263a31;color:white;cursor:pointer}.controls button.active{background:#547866}.node{cursor:grab}.node.dragging{cursor:grabbing}.node.simple .name{font-size:12px}#canvas-wrap{overflow:hidden}#canvas{width:100%;height:100%;display:block}#canvas.hand{cursor:grab}#canvas.hand.panning{cursor:grabbing}#canvas.hand .node{cursor:grab}.expand-control{cursor:pointer}.expand-control circle{fill:#15221d;stroke:white;stroke-width:1}.expand-control text{fill:white;font:bold 13px system-ui;pointer-events:none}.detail-actions{display:flex;gap:8px;margin:14px 0}.detail-actions button{padding:8px 10px;border:1px solid #8aa498;background:#eff6f2;border-radius:6px;cursor:pointer}</style></head>
<body><header><div><strong>Flowmap</strong><span class="subtitle">typed journeys through Go code</span></div><div class="search-wrap"><input id="search" autocomplete="off" placeholder="Search a function…"><div id="results" class="results hidden"></div></div><div class="controls"><select id="view"><option value="extended">Extended</option><option value="simple">Simplified</option></select><select id="direction"><option value="downstream">Downstream</option><option value="upstream">Upstream</option><option value="both">Both directions</option></select><label><input id="tests" type="checkbox"> Tests</label><button id="zoom-out" title="Zoom out">−</button><button id="zoom-in" title="Zoom in">+</button><button id="fit-graph">Fit</button><button id="hand-tool" aria-pressed="false">Hand</button><button id="reset-layout" class="hidden">Reset layout</button></div></header>
<main><section id="empty"><h1>Begin with a function.</h1><p>Search by package, receiver, or name. Flowmap reveals a focused typed neighborhood—not the whole-repository hairball.</p></section><section id="workspace" class="hidden"><div id="legend"><span class="dot pure"></span> pure <span class="dot edge"></span> edge <span class="dot unknown"></span> unknown <span class="dash"></span> dynamic candidate</div><div id="canvas-wrap"><svg id="canvas"><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4 0 8z"></path></marker></defs><g id="edges"></g><g id="nodes"></g></svg></div></section><aside id="detail" class="hidden"><button id="close">×</button><div id="detail-content"></div></aside></main><script src="/app.js"></script></body></html>
