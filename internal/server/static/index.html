<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flowmap</title><link rel="stylesheet" href="/style.css"><style>.controls button{padding:7px 9px;border:1px solid #71847a;border-radius:6px;background:#263a31;color:white;cursor:pointer}.controls button.active{background:#547866}.controls button:disabled{cursor:not-allowed;opacity:.4}.node{cursor:grab}.node.dragging{cursor:grabbing}.node.simple .name{font-size:12px}#canvas{display:block}#canvas.hand{cursor:grab}#canvas.hand.panning{cursor:grabbing}#canvas.hand .node{cursor:grab}.expand-control{cursor:pointer}.expand-control circle{fill:#15221d;stroke:white;stroke-width:1}.expand-control text{fill:white;font:bold 13px system-ui;pointer-events:none}.detail-actions{display:flex;gap:8px;margin:14px 0}.detail-actions button{padding:8px 10px;border:1px solid #8aa498;background:#eff6f2;border-radius:6px;cursor:pointer}#detail{width:var(--detail-width,min(520px,46vw));overflow:hidden;padding:0}#detail-content{width:100%;height:100%;overflow:auto;padding:25px}#detail-content>h2:first-child{padding-right:35px}#close{right:22px;z-index:2}#detail-resize{position:absolute;left:0;top:0;width:11px;height:100%;transform:translateX(-50%);cursor:ew-resize;touch-action:none;z-index:1}#detail-resize::after{content:"";position:absolute;left:5px;top:0;width:2px;height:100%;background:#8aa498;opacity:.45}#detail-resize:hover::after,#detail-resize.resizing::after{opacity:1;background:#547866}</style></head>
<body><header><div><strong>Flowmap</strong><span class="subtitle">typed journeys through Go code</span></div><div class="search-wrap"><input id="search" autocomplete="off" placeholder="Search a function…"><div id="results" class="results hidden"></div></div><div class="controls"><button id="history-back" title="Back to previous function" aria-label="Back to previous function" disabled>←</button><button id="history-forward" title="Forward to next function" aria-label="Forward to next function" disabled>→</button><select id="view"><option value="extended">Extended</option><option value="simple">Simplified</option></select><select id="direction"><option value="downstream">Downstream</option><option value="upstream">Upstream</option><option value="both">Both directions</option></select><label><input id="tests" type="checkbox"> Tests</label><button id="zoom-out" title="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21M7.5 10.5h6"/></svg></button><button id="zoom-in" title="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21M10.5 7.5v6M7.5 10.5h6"/></svg></button><button id="fit-graph" title="Fit graph" aria-label="Fit graph"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5"/></svg></button><button id="hand-tool" title="Pan tool" aria-label="Pan tool" aria-pressed="false"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7.5 11V6.5a1.5 1.5 0 0 1 3 0V10m0-4.5a1.5 1.5 0 0 1 3 0V10m0-3.5a1.5 1.5 0 0 1 3 0V10m0-2.5a1.5 1.5 0 0 1 3 0v5.8c0 4.2-2.8 6.7-6.7 6.7h-.9c-2.2 0-3.8-.8-5.2-2.5l-3-3.7a1.5 1.5 0 0 1 2.2-2l1.6 1.2V11Z"/></svg></button><button id="reset-layout" class="hidden" title="Reset layout" aria-label="Reset layout"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4v6h6M5.5 15a7 7 0 1 0 .5-7.5L4 10"/></svg></button></div></header>
<main><section id="empty"><h1>Begin with a function.</h1><p>Search by package, receiver, or name. Flowmap reveals a focused typed neighborhood—not the whole-repository hairball.</p></section><section id="workspace" class="hidden"><div id="legend"><span class="dot pure"></span> pure <span class="dot edge"></span> edge <span class="dot unknown"></span> unknown <span class="dash"></span> dynamic candidate</div><div id="canvas-wrap"><svg id="canvas"><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4 0 8z"></path></marker></defs><g id="edges"></g><g id="nodes"></g></svg></div></section><aside id="detail" class="hidden"><div id="detail-resize" role="separator" aria-label="Resize detail panel" aria-orientation="vertical"></div><button id="close">×</button><div id="detail-content"></div></aside></main><script src="/app.js"></script></body></html>
