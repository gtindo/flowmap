name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Release binaries must be at least as new as every Go toolchain
          # they officially support. Keep this independent from go.mod, which
          # records the minimum version needed to build Flowmap from source.
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: Build and verify release
        env:
          VERSION: ${{ github.ref_name }}
        run: make release VERSION="${VERSION#v}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "$VERSION" \
            dist/$VERSION/*.tar.gz \
            dist/$VERSION/SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "Flowmap $VERSION"
