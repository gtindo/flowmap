<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111827">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" type="image/png" sizes="192x192" href="{{ site.baseurl }}/internal/server/static/icon-192.png">
    <link rel="apple-touch-icon" href="{{ site.baseurl }}/internal/server/static/icon-192.png">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/guide.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand" href="{{ site.baseurl }}/" aria-label="Flowmap user guide home">
          <img src="{{ site.baseurl }}/internal/server/static/icon-192.png" alt="" width="32" height="32">
          <span>Flowmap</span>
        </a>
        <div class="nav-links">
          <a href="{{ site.baseurl }}/" aria-current="page">User guide</a>
          <a href="https://github.com/gtindo/flowmap">Repository</a>
          <a class="nav-cta" href="https://github.com/gtindo/flowmap/releases/latest">Download</a>
        </div>
      </nav>
    </header>

    <main class="guide" id="main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div>
        <span>Flowmap</span>
        <span class="footer-note">A local, spatial code-review workbench for Go.</span>
      </div>
      <a href="https://github.com/gtindo/flowmap">View on GitHub</a>
    </footer>
  </body>
</html>
